name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/knowledge_bot_backend:latest -f backend/Dockerfile backend/

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/knowledge_bot_backend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/chatbot-backend || mkdir -p /home/${{ secrets.SSH_USER }}/chatbot-backend
            cd /home/${{ secrets.SSH_USER }}/chatbot-backend

            if [ ! -f docker-compose.yml ]; then
              cat > docker-compose.yml << 'EOF'
            services:
              knowledge_postgres:
                image: pgvector/pgvector:pg16
                container_name: knowledge_bot_postgres
                environment:
                  POSTGRES_USER: knowledge_user
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                  POSTGRES_DB: knowledge_bot_db
                ports:
                  - "5437:5432"
                volumes:
                  - knowledge_postgres_data:/var/lib/postgresql/data
                restart: always
              knowledge_redis:
                image: redis:7-alpine
                container_name: knowledge_bot_redis
                ports:
                  - "6383:6379"
                volumes:
                  - knowledge_redis_data:/data
                restart: always
              knowledge_backend:
                image: DOCKER_USERNAME/knowledge_bot_backend:latest
                container_name: knowledge_bot_backend
                ports:
                  - "8005:8000"
                env_file:
                  - .env
                environment:
                  DATABASE_URL: postgresql://knowledge_user:${DB_PASSWORD}@knowledge_postgres:5432/knowledge_bot_db
                  REDIS_URL: redis://knowledge_redis:6379/0
                volumes:
                  - ./uploads:/app/uploads
                depends_on:
                  - knowledge_postgres
                  - knowledge_redis
                restart: always
            volumes:
              knowledge_postgres_data:
              knowledge_redis_data:
            EOF
            fi

            cat > .env << EOF
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_EMBEDDING_MODEL=text-embedding-ada-002
            OPENAI_CHAT_MODEL=gpt-4o
            CHUNK_SIZE=500
            CHUNK_OVERLAP=50
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SMTP_SERVER=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USER=hokageshizui199@gmail.com
            SMTP_PASSWORD=cymqdnfmplurcxwc
            SMTP_FROM=hokageshizui199@gmail.com
            FRONTEND_URL=http://localhost:3000
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF

            docker pull ${{ secrets.DOCKER_USERNAME }}/knowledge_bot_backend:latest
            docker compose down || true
            docker compose up -d
            docker image prune -f